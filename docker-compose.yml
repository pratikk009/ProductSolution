version: '3.9'

services:
  productapi:
    container_name: product_api
    build:
      context: .
      dockerfile: src/API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=ProductDb;User Id=ProductAppUser;Password=ProductSolution123!;TrustServerCertificate=True;"


      Jwt__Key: "THIS_IS_MY_SUPER_SECRET_KEY_1234567890_ABC"
      Jwt__Issuer: "ProductAPI"
      Jwt__Audience: "ProductAPIClient"
      Jwt__AccessTokenDurationInMinutes: 15
      Jwt__RefreshTokenDurationInDays: 7